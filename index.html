<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Kitsune Comics. Small stories with sharp teeth.">
<title>Kitsune Comics</title>
<style>
:root{--paper:#101214;--ink:#f6efe5;--muted:#aaa29a;--red:#d35d3e;--line:#343638;--panel:#17191b;font-family:system-ui,sans-serif;color:var(--ink);background:var(--paper)}
*{box-sizing:border-box}html{scroll-behavior:smooth;color-scheme:dark}body{margin:0;background:radial-gradient(circle at 10% 0,#d35d3e12,transparent 28rem),var(--paper)}
a{color:inherit;text-underline-offset:.2em}a:hover{color:var(--red)}header,footer,main{width:min(1100px,calc(100% - 2rem));margin:auto}
header{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--line)}
.brand{font:800 1.25rem Georgia,serif;text-decoration:none;display:flex;align-items:center;gap:.6rem}.mark{display:grid;place-items:center;border:2px solid;border-radius:48%;width:2.4rem;aspect-ratio:1;font-family:serif;transform:rotate(-5deg)}
nav{display:flex;align-items:center;gap:1.7rem;font:700 1rem Georgia,serif}nav a{text-decoration:none}.active{color:var(--red);text-decoration:underline}nav .support-link{color:var(--red)}
main{padding:clamp(3rem,8vw,7rem) 0}.kicker{color:var(--red);font-size:.78rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
h1,h2{font-family:Georgia,serif;letter-spacing:-.055em;line-height:.95;margin:.2rem 0}h1{font-size:clamp(3.5rem,11vw,7rem)}h2{font-size:clamp(2rem,6vw,4rem)}
.caption,.prose{font-family:Georgia,serif;color:var(--muted);font-size:1.15rem;line-height:1.6}
.row{display:flex;justify-content:space-between;align-items:end;gap:1rem;border-bottom:1px solid var(--line);margin-bottom:1rem}
.card{border:1px solid var(--line);border-radius:1rem;overflow:hidden;background:var(--panel);box-shadow:0 16px 45px #00000055}
.meta{padding:clamp(1.2rem,4vw,2.5rem);border-bottom:1px solid var(--line)}.meta h1,.meta h2{font-size:clamp(2.2rem,7vw,4.8rem)}
.caption{white-space:pre-wrap;margin:1rem 0 0}.date{display:block;color:var(--muted);margin-top:1rem;font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.pages{display:grid;gap:1px;background:var(--line)}.pages img{width:100%;display:block;background:#0b0c0d}
.actions{display:flex;justify-content:space-between;padding:1rem 1.25rem;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,17rem),1fr));gap:1rem}.tile{border:1px solid var(--line);border-radius:1rem;overflow:hidden;background:var(--panel)}.tile a{text-decoration:none}.tile img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}.tile div{padding:1rem}.tile h2{font-size:1.6rem}.tile p{color:var(--muted);margin:.4rem 0 0}
.state{display:grid;place-items:center;min-height:18rem;text-align:center;border:1px dashed var(--line);border-radius:1rem;padding:2rem}.state p{color:var(--muted);max-width:34rem;line-height:1.6}
.preview{background:repeating-linear-gradient(-45deg,#d35d3e0b 0 12px,transparent 12px 24px),var(--paper)}.badge{border:1px solid var(--red);color:var(--red);border-radius:999px;padding:.4rem .7rem;font-size:.72rem;font-weight:900}
.note{max-width:700px;margin:1rem auto;padding:1rem;border:1px solid var(--line);border-radius:.7rem;background:var(--panel)}
footer{border-top:1px solid var(--line);padding:2rem 0 3rem;color:var(--muted);font-size:.85rem}
.home{background:#101214}.home header{position:relative;z-index:5;width:100%;max-width:none;height:84px;padding:0 clamp(1.25rem,3.5vw,3.25rem);border:0;background:#111314;color:#f6efe5}.home .brand{font-size:clamp(1.3rem,2vw,1.75rem)}.home .mark{display:grid;color:#f6efe5;border-color:#f6efe5}.home nav a:hover,.home nav .active{color:#f6efe5;text-decoration:none;opacity:.72}.home nav .support-link{color:#e7785b}.home main{width:100%;max-width:none;padding:0}.home footer{width:100%;max-width:none;padding:2rem clamp(1.25rem,3.5vw,3.25rem);border-color:#2a2b2b;background:#111314;color:#aaa29a}
.hero-stage{position:relative;isolation:isolate;min-height:calc(100svh - 84px);display:flex;align-items:center;overflow:hidden;background:#101214;color:#f6efe5}.hero-art{position:absolute;z-index:-2;right:0;top:0;width:auto;height:100%;min-width:58%;object-fit:cover;object-position:center;opacity:0;transition:opacity .35s ease}.hero-art.ready{opacity:1}.hero-stage::before{content:"";position:absolute;z-index:-1;inset:0;background:linear-gradient(90deg,#101214 0%,#101214 34%,rgba(16,18,20,.97) 42%,rgba(16,18,20,.72) 53%,rgba(16,18,20,.22) 67%,rgba(16,18,20,.08) 100%)}.hero-stage::after{content:"";position:absolute;z-index:-1;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.18))}
.hero-copy{width:min(1100px,calc(100% - 2rem));margin:auto;padding:clamp(2.25rem,5vw,4.5rem) 0 6.5rem}.hero-copy-inner{width:min(40rem,48vw)}.hero-copy .kicker{margin:0 0 1.6rem;color:#d35d3e}.hero-title{display:grid;max-width:5.5ch;margin:0;color:#f6efe5;font-size:clamp(4.2rem,8.5vw,8rem);line-height:.83;letter-spacing:-.065em;text-shadow:0 3px 22px rgba(0,0,0,.28)}.hero-title span{display:block}.hero-deck{max-width:31rem;margin:1.7rem 0 0;font:1.15rem/1.55 Georgia,serif;color:#e8e0d6;text-shadow:0 2px 14px rgba(0,0,0,.35)}.hero-buttons{display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem}.hero-button{display:inline-flex;align-items:center;gap:1rem;min-height:3.6rem;padding:.85rem 1.65rem;border:1px solid rgba(246,239,229,.65);border-radius:.5rem;color:#f6efe5;text-decoration:none;font:700 1rem Georgia,serif;background:rgba(16,18,20,.35);backdrop-filter:blur(4px)}.hero-button.primary{border-color:#f6efe5;background:#f6efe5;color:#171512}.hero-button:hover{color:inherit;transform:translateY(-1px)}.scroll-cue{position:absolute;left:50%;bottom:1.2rem;display:grid;gap:.55rem;place-items:center;min-width:11rem;min-height:5rem;transform:translateX(-50%);color:#d8d0c7;font-size:.78rem;font-weight:900;letter-spacing:.18em;text-decoration:none;text-transform:uppercase;background:#101214;padding:1rem 2.25rem;border-radius:.75rem;box-shadow:0 0 34px 30px #101214}.scroll-cue::after{content:"";width:.65rem;height:.65rem;border-right:2px solid;border-bottom:2px solid;transform:rotate(45deg)}
.latest-wrap{width:min(1100px,calc(100% - 2rem));margin:0 auto;padding:clamp(3rem,7vw,6rem) 0;background:var(--paper)}.home .latest-shell{background:var(--paper);color:var(--ink)}.home .latest-shell .state{border-color:var(--line)}
@media(max-width:900px){.hero-art{right:-2%;min-width:66%}.hero-stage::before{background:linear-gradient(90deg,#101214 0%,rgba(16,18,20,.96) 45%,rgba(16,18,20,.62) 72%,rgba(16,18,20,.26) 100%)}.hero-copy-inner{width:min(36rem,66vw)}.hero-title{font-size:clamp(4rem,11vw,7rem)}}
@media(max-width:650px){header{gap:.5rem}.brand span:last-child{display:none}nav{gap:.55rem;font-size:.78rem}.home header{height:70px;padding:0 1rem}.home .brand{font-size:1.1rem}.home nav{gap:.55rem;font-size:.78rem}.hero-stage{min-height:calc(100svh - 70px);align-items:flex-start}.hero-art{right:-28%;min-width:128%;height:100%;object-position:center}.hero-stage::before{background:linear-gradient(180deg,#101214 0%,rgba(16,18,20,.96) 32%,rgba(16,18,20,.58) 58%,rgba(16,18,20,.12) 100%)}.hero-copy{padding:2.3rem 0 17rem}.hero-copy-inner{width:100%}.hero-copy .kicker{margin-bottom:1rem}.hero-title{font-size:clamp(3.55rem,17vw,5rem);line-height:.86}.hero-deck{max-width:24rem;font-size:1rem}.hero-buttons{gap:.7rem;margin-top:1.3rem}.hero-button{min-height:3.2rem;padding:.75rem 1rem;font-size:.9rem}.scroll-cue{display:none}.latest-wrap{padding-top:3rem}}
</style>
</head>
<body>
<header><a class="brand" href="/"><span class="mark">狐</span><span>Kitsune Comics</span></a><nav><a data-nav="latest" href="/">Latest</a><a data-nav="archive" href="/archive">Archive</a><a data-nav="about" href="/about">About</a><a class="support-link" href="https://venmo.com/u/bgphx" target="_blank" rel="noopener noreferrer">Support</a></nav></header>
<main id="app"><div class="state"><p>Opening the den…</p></div></main>
<footer>Made independently. No feed algorithm, no account required.</footer>
<script>
const $=s=>document.querySelector(s),el=(t,c,x)=>{const n=document.createElement(t);if(c)n.className=c;if(x!==undefined)n.textContent=x;return n};
const api=async u=>{const r=await fetch(u),j=await r.json().catch(()=>({error:"Unreadable response"}));if(!r.ok)throw Error(j.error||"Request failed");return j};
const fmt=v=>v?new Intl.DateTimeFormat(undefined,{year:"numeric",month:"long",day:"numeric"}).format(new Date(v)):"";
function state(title,msg){const d=el("div","state"),b=el("div");b.append(el("h2","",title),el("p","",msg));d.append(b);return d}
function comic(c,level=1,actions=false){const a=el("article","card"),m=el("div","meta"),h=el("h"+level,"",c.title||"Untitled comic");m.append(h);if(c.caption)m.append(el("p","caption",c.caption));if(c.published_at)m.append(el("time","date",fmt(c.published_at)));a.append(m);const p=el("div","pages");(c.images||[]).forEach((im,i)=>{const x=el("img");x.src=im.url;x.alt=im.alt_text||`Page ${i+1} of ${c.title||"comic"}`;x.loading="lazy";p.append(x)});a.append(p);if(actions){const z=el("div","actions"),o=el("a","","Open comic"),r=el("a","","Archive");o.href="/comic/"+encodeURIComponent(c.slug);r.href="/archive";z.append(o,r);a.append(z)}return a}
function base(active){document.body.className="";document.querySelectorAll("[data-nav]").forEach(a=>a.classList.toggle("active",a.dataset.nav===active));const badge=document.querySelector("header .badge");if(badge)badge.remove();const app=$("#app");app.className="";app.replaceChildren();return app}
async function loadHeroImage(img){try{const parts=await Promise.all([0,1,2,3,4,5].map(i=>fetch(`/assets/hero.${i}.txt`).then(r=>{if(!r.ok)throw Error('Hero image missing');return r.text()})));img.onload=()=>img.classList.add('ready');img.src='data:image/webp;base64,'+parts.join('')}catch(e){console.error(e)}}
async function latest(){document.title="Kitsune Comics";const app=base("latest");document.body.classList.add("home");const hero=el("section","hero-stage"),art=el("img","hero-art"),copy=el("div","hero-copy"),inner=el("div","hero-copy-inner"),title=el("h1","hero-title"),buttons=el("div","hero-buttons"),read=el("a","hero-button primary","Read latest comic"),browse=el("a","hero-button","Browse archive"),scroll=el("a","scroll-cue","Scroll");["Small","stories.","Sharp","teeth."].forEach(t=>title.append(el("span","",t)));read.href="#latest-comic";read.append(el("span","","→"));browse.href="/archive";browse.append(el("span","","→"));scroll.href="#latest-comic";buttons.append(read,browse);inner.append(el("p","kicker","Comics by Kitsune"),title,el("p","hero-deck","A quiet corner of the internet for drawings, creatures, feelings, trouble, and whatever survives the page."),buttons);copy.append(inner);art.alt="Kitsune the fox sitting in a cozy room at twilight";hero.append(art,copy,scroll);loadHeroImage(art);const shell=el("section","latest-shell"),wrap=el("div","latest-wrap"),row=el("div","row"),target=state("Loading…","Fetching the newest comic.");shell.id="latest-comic";row.append(el("h2","","Latest comic"));wrap.append(row,target);shell.append(wrap);app.append(hero,shell);try{const j=await api("/api?action=list&limit=1");if(j.comics.length){read.href="/comic/"+encodeURIComponent(j.comics[0].slug);target.replaceWith(comic(j.comics[0],2,true))}else target.replaceWith(state("The den is ready.","The first comic has not been published yet."))}catch(e){target.replaceWith(state("The fox tripped over a cable.",e.message))}}
async function archive(){document.title="Archive | Kitsune Comics";const app=base("archive");app.append(el("p","kicker","Every published comic"),el("h1","","Archive"));const g=el("div","grid");app.append(g);try{const j=await api("/api?action=list&limit=100");if(!j.comics.length)return g.append(state("No comics yet.","Published comics will collect here in order."));j.comics.forEach(c=>{const t=el("article","tile"),a=el("a"),d=el("div");a.href="/comic/"+encodeURIComponent(c.slug);if(c.images[0]){const i=el("img");i.src=c.images[0].url;i.alt=`First page of ${c.title}`;a.append(i)}d.append(el("h2","",c.title||"Untitled comic"),el("p","",fmt(c.published_at)));a.append(d);t.append(a);g.append(t)})}catch(e){g.append(state("Could not open archive.",e.message))}}
async function one(slug,preview=false){document.title=(preview?"Private Preview":"Comic")+" | Kitsune Comics";const app=base("");if(preview){document.body.className="preview";const b=el("span","badge","Private preview");$("header").append(b)}const target=state("Loading…","Fetching comic.");app.append(target);try{const q=preview?`action=preview&token=${encodeURIComponent(slug)}`:`action=comic&slug=${encodeURIComponent(slug)}`,j=await api("/api?"+q);document.title=(j.comic.title||"Comic")+" | Kitsune Comics";target.replaceWith(comic(j.comic,1));if(preview)app.append(el("div","note","Nothing here is public yet. Use the Publish button in the private uploader, or reply PUBLISH to the draft email."))}catch(e){target.replaceWith(state("Comic not found.",e.message))}}
function about(){document.title="About | Kitsune Comics";const app=base("about");app.append(el("p","kicker","About the artist"),el("h1","","Kitsune makes comics."),el("p","prose","This independent site is her home on the web. It keeps the work readable, chronological, and outside the machinery of social-media feeds."),el("p","prose","This page is waiting for Kitsune's own biography, links, and support information rather than inventing a personality for an actual person."))}
const path=decodeURIComponent(location.pathname).replace(/\/+$/ ,"")||"/";if(path==="/")latest();else if(path==="/archive")archive();else if(path==="/about")about();else if(path.startsWith("/comic/"))one(path.slice(7));else if(path.startsWith("/preview/"))one(path.slice(9),true);else base("").append(state("Page not found.","This path wandered out of the den."));
</script>
</body></html>
