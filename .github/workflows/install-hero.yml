name: Install direct hero asset

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install-hero.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build real WebP and simplify loader
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          parts = [
              "assets/hero-clean.0.hex",
              "assets/hero-clean.1.hex",
              "assets/hero-clean.2.hex",
              "assets/hero-sharp.3a.hex",
              "assets/hero-sharp.3b.hex",
              "assets/hero-sharp.4a.hex",
              "assets/hero-sharp.4b.hex",
              "assets/hero-sharp.5a.hex",
              "assets/hero-sharp.5b.hex",
          ]

          data = bytes.fromhex("".join(Path(p).read_text().strip() for p in parts))
          if not data.startswith(b"RIFF") or data[8:12] != b"WEBP":
              raise SystemExit("Invalid reconstructed WebP")
          Path("assets/hero-clean.webp").write_bytes(data)

          p = Path("index.html")
          text = p.read_text()
          text = re.sub(
              r"async function loadHeroImage\(img\)\{.*?\}\nasync function latest\(\)",
              'function loadHeroImage(img){img.onload=()=>img.classList.add("ready");img.onerror=()=>console.error("Hero image missing");img.src="/assets/hero-clean.webp?v=real-1"}\nasync function latest()',
              text,
              count=1,
              flags=re.S,
          )
          p.write_text(text)

          for path in [Path("functions/_middleware.js"), Path("functions/hero-clean.webp.js")]:
              if path.exists():
                  path.unlink()
          PY

      - name: Commit real hero asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use real full-resolution hero asset"
          git push
